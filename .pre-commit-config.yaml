# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: fix-byte-order-marker
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: pretty-format-json
        args:
          - "--autofix"
          - "--indent=2"
          - "--no-sort-keys"
      - id: trailing-whitespace

  # validate Makefile
  - repo: https://github.com/mrtazz/checkmake.git
    rev: "0.2.2"
    hooks:
      - id: checkmake

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
      - id: pyupgrade

  # Run linting checks on dockerfiles
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker # Requires docker cli and colima to be started. Run with `SKIP=hadolint-docker` env var set to skip.
        name: hadolint
        types: [text]
        files: (Dockerfile|\.dockerfile$)

    # type hint checking
    # TODO: Reenable ASAP to allow type checking to run
    #  - repo: local
    #    hooks:
    #    - id: mypy
    #      name: make check-py-mypy
    #      entry: "make check-py-mypy"
    #      language: system
    #      'types_or': [python, pyi]
    #      pass_filenames: false
    #      verbose: false

    # Run linting checks on shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: shellcheck
        language_version: "python3.10"

  # Ensure ruff linter and formatter is run on everything
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.12
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  # TOML conformance
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
      - id: taplo-lint
        args: [] # because I don't want to force people to set TAPLO_EXTRA_CA_CERTS

    # Check to ensure poetry things are valid
  - repo: https://github.com/python-poetry/poetry
    rev: "2.1.4"
    hooks:
      - id: poetry-check
      - id: poetry-lock
        additional_dependencies: [pkginfo>=1.11.1] # Required so poetry pulls transitive dependencies

  # Ensure version in repo remains 0.0.0 so version can be set through git tags
  - repo: local
    hooks:
      - id: poetry-version-resetter
        name: Reset Poetry Project Version to 0.0.0
        entry: "poetry version 0.0.0"
        language: system
        files: pyproject.toml
        pass_filenames: false
        verbose: false
